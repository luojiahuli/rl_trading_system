# 热点板块挖掘 — A 股（定时 + 手动触发）
name: Hot Sector CN

on:
  schedule:
    - cron: "30 1 * * 1-5"  # 北京时间 9:30（UTC 1:30）
    - cron: "0 8 * * 1-5"   # 北京时间 16:00（UTC 8:00）
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e /Users/mac13/workspace/scrapling_utils
          pip install -r requirements.txt

      - name: Run hot sector agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m src.agents.hot_sector_agent --output output/reports/
